<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heal Your Mind · Apoyo emocional</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #1b3b2b 0%, #2d6a4f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chat-container {
      width: 900px;
      max-width: 95%;
      height: 750px;
      background: #f0f7f0;
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 2px solid #409f7e;
    }

    .chat-header {
      background: #1f4d3a;
      color: white;
      padding: 20px 25px;
      text-align: center;
    }

    .chat-header h2 {
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .chat-header .status {
      font-size: 1rem;
      opacity: 0.95;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .chat-header .status::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #80ed99;
      border-radius: 50%;
      animation: pulse 1.8s infinite;
      box-shadow: 0 0 8px #a7f0ba;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }

    .chat-messages {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      background: #eaf5ea;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 80%;
      padding: 14px 20px;
      border-radius: 28px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 1rem;
      box-shadow: 0 4px 8px rgba(0, 40, 20, 0.1);
    }

    .user {
      align-self: flex-end;
      background: #1f4d3a;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .assistant {
      align-self: flex-start;
      background: white;
      color: #1e2e24;
      border: 1px solid #b7e0cf;
      border-bottom-left-radius: 6px;
    }

    /* Sección de opciones rápidas (minimizable) - SIN IMAGEN */
    .quick-section {
      background: white;
      border-top: 2px solid #409f7e;
      border-bottom: 2px solid #409f7e;
    }

    .quick-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: #dcf2e9;
      cursor: pointer;
      font-weight: 600;
      color: #1d4233;
      transition: background 0.2s;
    }

    .quick-header:hover {
      background: #c8e6d9;
    }

    .quick-header span:last-child {
      font-size: 1.4rem;
      user-select: none;
    }

    .quick-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px;
      background: #f5fff5;
      transition: all 0.3s ease;
    }

    .quick-options.collapsed {
      display: none;
    }

    .quick-btn {
      background: #e5f4eb;
      border: 1px solid #2f6b53;
      padding: 14px 22px;
      border-radius: 40px;
      font-size: 1rem;
      color: #1d4e3d;
      cursor: pointer;
      transition: all 0.25s ease;
      flex: 1 1 auto;
      min-width: 180px;
      box-shadow: 0 2px 6px rgba(0, 60, 30, 0.1);
      font-weight: 500;
    }

    .quick-btn:hover {
      background: #c0e0d2;
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(36, 113, 82, 0.3);
      border-color: #1e8b5e;
    }

    .chat-input {
      display: flex;
      padding: 20px;
      background: white;
      border-top: 2px solid #409f7e;
      gap: 12px;
    }

    .chat-input input {
      flex: 1;
      padding: 16px 20px;
      border: 2px solid #c0dfd2;
      border-radius: 50px;
      outline: none;
      font-size: 1rem;
      transition: 0.2s;
      background: #f6fff6;
    }

    .chat-input input:focus {
      border-color: #1f7b5c;
      box-shadow: 0 0 0 3px rgba(42, 141, 106, 0.3);
    }

    .chat-input button {
      background: #1f4d3a;
      color: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(23, 78, 56, 0.4);
    }

    .chat-input button:hover {
      background: #143b2c;
      transform: scale(1.05);
    }

    .chat-input button svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 16px 22px;
      background: white;
      border-radius: 28px;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      border: 1px solid #b7e0cf;
      margin-top: 5px;
    }

    .typing-indicator span {
      width: 10px;
      height: 10px;
      background: #2d6a4f;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-12px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>🌿 Heal Your Mind</h2>
      <div class="status">En línea y escuchando</div>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <!-- Sección de opciones rápidas (sin imagen) -->
    <div class="quick-section">
      <div class="quick-header" onclick="toggleQuickOptions()">
        <span>📋 Temas rápidos</span>  <!-- Cambiado a "Temas rápidos" sin imagen -->
        <span id="quick-toggle">▼</span>
      </div>
      <div id="quick-options" class="quick-options">
        <button class="quick-btn" onclick="sendQuickMessage('Necesito hablar con alguien')">🗣️ Hablar con alguien</button>
        <button class="quick-btn" onclick="sendQuickMessage('Me siento abrumado/a')">😔 Me siento abrumado/a</button>
        <button class="quick-btn" onclick="sendQuickMessage('Quiero técnicas de relajación')">🧘 Técnicas de relajación</button>
        <button class="quick-btn" onclick="sendQuickMessage('Solo quiero desahogarme')">💬 Solo desahogarme</button>
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="msg" placeholder="Comparte lo que sientes..." autocomplete="off" />
      <button onclick="enviar()">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // System prompt mejorado (empático, breve por defecto, se explaya cuando se le pide)
    let conversation = [
      { 
        role: "system", 
        content: "Eres un asistente de apoyo emocional, extremadamente empático, cálido y humano. Tu objetivo es hacer sentir acompañada a la persona, validar sus emociones y ofrecer consuelo o reflexión. Por defecto, responde de manera breve: máximo 2 párrafos cortos (unas 4-5 líneas en total), a menos que el usuario te pida explícitamente que te extiendas (por ejemplo: 'cuéntame más', 'dame más detalles', 'necesito más consejos', 'quiero 20 tips', 'expláyate', etc.). Cuando te pidan más, puedes dar respuestas más largas y detalladas. Mantén siempre un tono cercano, como un amigo que escucha sin juzgar." 
      }
    ];

    const chatDiv = document.getElementById("chat-messages");

    function agregarMensaje(texto, tipo) {
      const div = document.createElement("div");
      div.classList.add("message", tipo);
      if (tipo === 'assistant' && texto.includes('\n')) {
        const parrafos = texto.split('\n').filter(p => p.trim() !== '');
        parrafos.forEach(p => {
          const pElem = document.createElement('p');
          pElem.innerText = p;
          div.appendChild(pElem);
        });
      } else {
        div.innerText = texto;
      }
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function mostrarEscribiendo() {
      const div = document.createElement("div");
      div.classList.add("typing-indicator");
      div.id = "typing";
      div.innerHTML = '<span></span><span></span><span></span>';
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function ocultarEscribiendo() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    async function enviarMensaje(mensaje) {
      if (!mensaje) return;
      agregarMensaje(mensaje, "user");
      conversation.push({ role: "user", content: mensaje });

      mostrarEscribiendo();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversation })
        });
        const data = await res.json();
        ocultarEscribiendo();

        if (data.reply) {
          agregarMensaje(data.reply, "assistant");
          conversation.push({ role: "assistant", content: data.reply });
          // Limitar historial a 10 intercambios (opcional)
          if (conversation.length > 21) {
            conversation.splice(1, 2);
          }
        } else {
          agregarMensaje("Lo siento, hubo un error. Intenta de nuevo.", "assistant");
        }
      } catch (error) {
        ocultarEscribiendo();
        agregarMensaje("Error de conexión. ¿Estás conectado a internet?", "assistant");
      }
    }

    function enviar() {
      const input = document.getElementById("msg");
      const mensaje = input.value.trim();
      if (mensaje) {
        enviarMensaje(mensaje);
        input.value = "";
      }
    }

    function sendQuickMessage(mensaje) {
      enviarMensaje(mensaje);
    }

    function toggleQuickOptions() {
      const options = document.getElementById("quick-options");
      const toggle = document.getElementById("quick-toggle");
      options.classList.toggle("collapsed");
      toggle.innerText = options.classList.contains("collapsed") ? "▶" : "▼";
    }

    document.getElementById("msg").addEventListener("keypress", function(e) {
      if (e.key === "Enter") enviar();
    });

    // Mensaje de bienvenida opcional (descomentar si se quiere)
    // window.onload = function() {
    //   enviarMensaje("Hola, estoy aquí para escucharte. ¿Cómo te sientes hoy?");
    // };
  </script>
</body>
</html>
